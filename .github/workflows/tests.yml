name: CI - Run Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-group:
          - name: 'auth-users'
            pattern: 'tests/(auth|users)/**/*.test.ts'
          - name: 'diets'
            pattern: 'tests/diets/**/*.test.ts'
          - name: 'training'
            pattern: 'tests/training/**/*.test.ts'
          - name: 'chat-citas'
            pattern: 'tests/(chat|citas)/**/*.test.ts'
          - name: 'others'
            pattern: 'tests/(alimentos|assignmentRequests|config|estadisticas|google|incidents|suscriptionPlan|valoraciones|video)/**/*.test.ts'

    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install
        working-directory: ./backend

      - name: Run tests - ${{ matrix.test-group.name }}
        env:
          MONGO_URI_TEST: mongodb://localhost:27017/nutroos_test
          JWT_SECRET: test_secret
          NODE_ENV: test
          NODE_OPTIONS: --max_old_space_size=4096
        run: npx jest --testPathPattern="${{ matrix.test-group.pattern }}" --runInBand --detectOpenHandles --forceExit --logHeapUsage
        working-directory: ./backend